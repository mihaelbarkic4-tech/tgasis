<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Утро · Планировщик</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --text-dim: #8b919e;
    --accent: #7aa2f7;
    --accent-soft: #2c3957;
    --done: #3a3f4b;
    --today: #f7768e;
    --danger: #f7768e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; min-height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel); position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .nav { display: flex; gap: 6px; align-items: center; margin-left: auto; }
  .nav button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font: inherit;
  }
  .nav button:hover { background: var(--accent-soft); }
  .nav .range { color: var(--text-dim); padding: 0 8px; min-width: 200px; text-align: center; }

  main {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 10px; padding: 16px; min-height: calc(100vh - 60px);
  }
  .col {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; display: flex; flex-direction: column;
    min-height: 200px;
  }
  .col.today { border-color: var(--today); }
  .col.past { opacity: 0.7; }
  .col.drag-over { background: var(--accent-soft); }

  .col-head {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .col-head .wd { font-weight: 600; }
  .col-head .date { color: var(--text-dim); font-size: 12px; }
  .col.today .col-head .wd { color: var(--today); }

  .tasks { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .task {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    display: flex; gap: 8px; align-items: flex-start;
    cursor: grab; user-select: none;
  }
  .task:active { cursor: grabbing; }
  .task.dragging { opacity: 0.4; }
  .task.done .text, .task.done .time { color: var(--done); text-decoration: line-through; }
  .task .check {
    flex-shrink: 0; width: 18px; height: 18px; border: 1.5px solid var(--text-dim);
    border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .task.done .check { background: var(--accent); border-color: var(--accent); color: #0f1115; font-weight: 700; }
  .task.done .check::after { content: "✓"; font-size: 12px; }
  .task .body { flex: 1; min-width: 0; }
  .task .time { color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 2px; }
  .task .time:empty { display: none; }
  .task .text { word-break: break-word; }
  .task input.edit, .task input.time-edit {
    background: transparent; border: none; color: inherit;
    font: inherit; width: 100%; outline: none;
    border-bottom: 1px solid var(--accent);
  }
  .task input.time-edit { width: 60px; font-size: 12px; }
  .task .del {
    flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
    background: none; border: none; color: var(--danger); cursor: pointer;
    font-size: 16px; padding: 0 4px;
  }
  .task:hover .del { opacity: 1; }

  .add-form {
    padding: 8px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .add-form .row { display: flex; gap: 6px; }
  .add-form input {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; border-radius: 6px; font: inherit; outline: none;
  }
  .add-form input:focus { border-color: var(--accent); }
  .add-form input[name="text"] { flex: 1; }
  .add-form input[name="time"] { width: 70px; }
  .add-form button {
    background: var(--accent-soft); border: 1px solid var(--accent);
    color: var(--text); padding: 6px 10px; border-radius: 6px;
    cursor: pointer; font: inherit;
  }
  .add-form button:hover { background: var(--accent); color: #0f1115; }

  .empty { color: var(--text-dim); text-align: center; padding: 20px 8px; font-size: 12px; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--danger); color: #fff; padding: 10px 16px; border-radius: 8px;
    z-index: 100; opacity: 0; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 1100px) {
    main { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    main { grid-template-columns: 1fr; }
    .nav .range { min-width: auto; font-size: 12px; }
    header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 Утро</h1>
  <div class="nav">
    <button id="prev">←</button>
    <button id="today-btn">Сегодня</button>
    <button id="next">→</button>
    <span class="range" id="range"></span>
  </div>
</header>

<main id="grid"></main>

<div class="toast" id="toast"></div>

<script>
const WEEKDAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
const MONTHS = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];

let weekStart = mondayOf(new Date());
let tasks = [];

function pad(n) { return String(n).padStart(2, '0'); }
function ymd(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function mondayOf(d) {
  const x = new Date(d); x.setHours(0, 0, 0, 0);
  const day = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - day);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function fmtDate(d) { return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function isSameDay(a, b) { return ymd(a) === ymd(b); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'network' }));
    toast(err.error || 'ошибка');
    throw new Error(err.error || 'network');
  }
  return res.json();
}

async function loadWeek() {
  const from = ymd(weekStart);
  const to = ymd(addDays(weekStart, 6));
  document.getElementById('range').textContent = `${fmtDate(weekStart)} — ${fmtDate(addDays(weekStart, 6))}`;
  tasks = await api('GET', `/api/tasks?from=${from}&to=${to}`);
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const today = new Date(); today.setHours(0, 0, 0, 0);

  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const dayStr = ymd(d);
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.day = dayStr;
    if (isSameDay(d, today)) col.classList.add('today');
    if (d < today) col.classList.add('past');

    col.innerHTML = `
      <div class="col-head">
        <span class="wd">${WEEKDAYS[i]}</span>
        <span class="date">${fmtDate(d)}</span>
      </div>
      <div class="tasks"></div>
      <form class="add-form">
        <div class="row">
          <input name="time" placeholder="HH:MM" maxlength="5">
          <button type="submit">+</button>
        </div>
        <input name="text" placeholder="Новая задача" required>
      </form>
    `;

    const tasksEl = col.querySelector('.tasks');
    const dayTasks = tasks.filter(t => t.day === dayStr);
    if (dayTasks.length === 0) {
      tasksEl.innerHTML = '<div class="empty">пусто</div>';
    } else {
      dayTasks.forEach(t => tasksEl.appendChild(renderTask(t)));
    }

    const form = col.querySelector('.add-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = form.text.value.trim();
      const time = form.time.value.trim() || null;
      if (!text) return;
      try {
        const newTask = await api('POST', '/api/tasks', { text, time, day: dayStr });
        tasks.push(newTask);
        form.reset();
        render();
      } catch {}
    });

    setupDropZone(col);
    grid.appendChild(col);
  }
}

function renderTask(t) {
  const el = document.createElement('div');
  el.className = 'task' + (t.done ? ' done' : '');
  el.draggable = true;
  el.dataset.id = t.id;
  el.innerHTML = `
    <div class="check"></div>
    <div class="body">
      <div class="time">${t.time || ''}</div>
      <div class="text"></div>
    </div>
    <button class="del" title="Удалить">×</button>
  `;
  el.querySelector('.text').textContent = t.text;

  el.querySelector('.check').addEventListener('click', async () => {
    try {
      const updated = await api('PATCH', `/api/tasks?id=${t.id}`, { done: !t.done });
      Object.assign(t, updated);
      render();
    } catch {}
  });

  el.querySelector('.del').addEventListener('click', async (e) => {
    e.stopPropagation();
    try {
      await api('DELETE', `/api/tasks?id=${t.id}`);
      tasks = tasks.filter(x => x.id !== t.id);
      render();
    } catch {}
  });

  el.querySelector('.text').addEventListener('click', () => editField(el, t, 'text'));
  el.querySelector('.time').addEventListener('click', () => editField(el, t, 'time'));
  el.querySelector('.body').addEventListener('dblclick', () => {
    if (!t.time) editField(el, t, 'time');
  });

  el.addEventListener('dragstart', (e) => {
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(t.id));
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));

  return el;
}

function editField(el, task, field) {
  const target = el.querySelector('.' + field);
  const old = task[field] || '';
  const input = document.createElement('input');
  input.value = old;
  input.className = field === 'time' ? 'time-edit' : 'edit';
  if (field === 'time') input.placeholder = 'HH:MM';
  target.replaceWith(input);
  input.focus();
  input.select();

  const finish = async (save) => {
    const val = input.value.trim();
    if (!save || val === old) { render(); return; }
    try {
      const payload = {};
      payload[field] = field === 'time' ? (val || null) : val;
      const updated = await api('PATCH', `/api/tasks?id=${task.id}`, payload);
      Object.assign(task, updated);
    } catch {}
    render();
  };

  input.addEventListener('blur', () => finish(true));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  });
}

function setupDropZone(col) {
  col.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', (e) => {
    if (e.target === col) col.classList.remove('drag-over');
  });
  col.addEventListener('drop', async (e) => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const id = parseInt(e.dataTransfer.getData('text/plain'), 10);
    const newDay = col.dataset.day;
    const task = tasks.find(t => t.id === id);
    if (!task || task.day === newDay) return;
    try {
      const updated = await api('PATCH', `/api/tasks?id=${id}`, { day: newDay });
      Object.assign(task, updated);
      render();
    } catch {}
  });
}

document.getElementById('prev').addEventListener('click', () => { weekStart = addDays(weekStart, -7); loadWeek(); });
document.getElementById('next').addEventListener('click', () => { weekStart = addDays(weekStart, 7); loadWeek(); });
document.getElementById('today-btn').addEventListener('click', () => { weekStart = mondayOf(new Date()); loadWeek(); });

loadWeek();
</script>
</body>
</html>
